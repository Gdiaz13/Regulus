name: CI

# Backend, web, and AI checks for every push and PR to main.
# The Windows MAUI build needs runner workload installs and gets its own
# workflow later, so a slow queue never blocks these fast checks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test Regulas.Api
        run: dotnet test api.Tests/api.Tests.csproj --nologo

  web:
    name: Web lint, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exchange-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: exchange-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Function-length rule (web, api, MAUI)
        run: npm run lint:functions
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build

  ai:
    name: AI tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: ai/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Tests
        run: pytest
